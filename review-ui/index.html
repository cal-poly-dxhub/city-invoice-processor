<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Reconciliation Review</title>

  <!-- Distinctive Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Editorial color palette */
      --color-bg: #fafaf8;
      --color-surface: #ffffff;
      --color-text: #1a1a1a;
      --color-text-secondary: #666666;
      --color-border: #e0e0e0;
      --color-accent: #2b4c7e;

      /* Match quality indicators */
      --color-excellent: #2d5016;
      --color-good: #4a7c28;
      --color-partial: #c27803;
      --color-poor: #c45500;
      --color-none: #991b1b;

      /* Typography */
      --font-serif: 'Crimson Pro', Georgia, serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
      --font-sans: 'DM Sans', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
